function buildSeed(){
  return RAW.map(r=>({id:r[0],location:LOCATIONS[r[1]],component:COMPONENTS[r[2]],analysis:r[3],remedy:r[4]||"",severity:SEVERITIES[r[5]],status:r[5]===4?"Accepted":"Open",dateReported:"2026-06-07",dateFixed:null,dateVerified:null,notes:[]}));
}

// ─── IndexedDB for user photos ────────────────────────────
const DB_NAME="pdi-photos";const DB_VER=1;const STORE="photos";
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=()=>{req.result.createObjectStore(STORE)};
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function savePhoto(snagId,photoId,dataUrl){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(dataUrl,`${snagId}-${photoId}`);
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);
  });
}
async function getPhotos(snagId){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readonly");
    const store=tx.objectStore(STORE);
    const req=store.getAllKeys();
    req.onsuccess=()=>{
      const keys=req.result.filter(k=>k.startsWith(snagId+"-"));
      const photos=[];
      let done=0;
      if(keys.length===0)return res([]);
      keys.forEach(k=>{
        const r2=store.get(k);
        r2.onsuccess=()=>{photos.push({key:k,data:r2.result});done++;if(done===keys.length)res(photos.sort((a,b)=>a.key.localeCompare(b.key)))};
        r2.onerror=()=>{done++;if(done===keys.length)res(photos)};
      });
    };
    req.onerror=()=>rej(req.error);
  });
}
async function deletePhoto(key){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(key);
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);
  });
}

function compressImage(dataUrl,maxDim=800,quality=0.7){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxDim||h>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",quality));
    };
    img.src=dataUrl;
  });
}

const SK="pdi-snags-v2";

// ─── MAIN APP ─────────────────────────────────────────────
function App(){
  const [snags,setSnags]=useState(()=>{
    try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);if(p.length===91)return p}}catch(e){}
    return buildSeed();
  });
  const [tab,setTab]=useState("dashboard");
  const [selId,setSelId]=useState(null);
  const [selRoom,setSelRoom]=useState(null);
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("All");
  const [fSev,setFSev]=useState("All");
  const [fComp,setFComp]=useState("All");
  const [showExport,setShowExport]=useState(false);

  const save=useCallback(u=>{setSnags(u);localStorage.setItem(SK,JSON.stringify(u))},[]);
  const update=useCallback((id,ch)=>{const u=snags.map(s=>s.id===id?{...s,...ch}:s);save(u)},[snags,save]);
  const addNote=useCallback((id,text)=>{const d=new Date().toISOString().slice(0,10);const u=snags.map(s=>s.id===id?{...s,notes:[{date:d,text},...s.notes]}:s);save(u)},[snags,save]);
  const resetAll=useCallback(()=>{if(confirm("Reset all data to original inspection report?")){save(buildSeed())}},[save]);

  const actionable=useMemo(()=>snags.filter(s=>s.severity!=="Info"),[snags]);
  const stats=useMemo(()=>{
    const o={total:actionable.length,Open:0,"In Progress":0,Fixed:0,Accepted:0,Disputed:0};
    actionable.forEach(s=>{o[s.status]=(o[s.status]||0)+1});
    o.resolved=o.Fixed+o.Accepted;o.pct=o.total?Math.round(o.resolved/o.total*100):0;
    return o;
  },[actionable]);

  const filtered=useMemo(()=>{
    let l=snags.filter(s=>s.severity!=="Info");
    if(fStatus!=="All")l=l.filter(s=>s.status===fStatus);
    if(fSev!=="All")l=l.filter(s=>s.severity===fSev);
    if(fComp!=="All")l=l.filter(s=>s.component===fComp);
    if(search){const q=search.toLowerCase();l=l.filter(s=>s.analysis.toLowerCase().includes(q)||s.location.toLowerCase().includes(q)||s.component.toLowerCase().includes(q)||String(s.id).includes(q))}
    return l;
  },[snags,fStatus,fSev,fComp,search]);

  const roomSnags=useMemo(()=>{
    const m={};LOCATIONS.forEach(l=>{m[l]={total:0,resolved:0,items:[]}});
    snags.forEach(s=>{if(s.severity==="Info"||!m[s.location])return;m[s.location].total++;m[s.location].items.push(s);if(s.status==="Fixed"||s.status==="Accepted")m[s.location].resolved++});
    return m;
  },[snags]);

  const sel=selId?snags.find(s=>s.id===selId):null;

  // Detail view
  if(sel)return <Detail snag={sel} onBack={()=>setSelId(null)} onUpdate={update} onAddNote={addNote}/>;

  // Export
  if(showExport){
    const open=snags.filter(s=>s.severity!=="Info"&&s.status!=="Accepted");
    const g={};open.forEach(s=>{if(!g[s.location])g[s.location]=[];g[s.location].push(s)});
    const txt=Object.entries(g).map(([l,items])=>`📍 ${l}\n`+items.map(s=>`  #${s.id} [${s.status}] ${s.analysis}${s.severity==="Critical"?" 🔴":""}`).join("\n")).join("\n\n");
    const full=`🏠 PDI Snag Report — Flat H-802\n${new Date().toLocaleDateString()}\n${open.length} items pending\n\n${txt}`;
    return(
      <div className="container">
        <div className="header"><button onClick={()=>setShowExport(false)}>{Ic.back}</button><h2>Export Summary</h2>
          <button onClick={()=>{navigator.clipboard?.writeText(full);alert("Copied!")}} style={{color:"var(--blue)"}}>{Ic.share}</button>
        </div>
        <div className="content" style={{padding:16}}><pre className="export-text">{full}</pre></div>
      </div>
    );
  }

  // Room detail
  if(selRoom){
    const r=roomSnags[selRoom];const pct=r.total?Math.round(r.resolved/r.total*100):100;
    return(
      <div className="container">
        <div className="header">
          <button onClick={()=>setSelRoom(null)}>{Ic.back}</button>
          <div style={{flex:1}}><h2 style={{fontSize:16,fontWeight:600}}>{selRoom}</h2>{ROOM_DIMS[selRoom]&&<p style={{fontSize:12,color:"var(--text4)"}}>{ROOM_DIMS[selRoom]} ft</p>}</div>
          <span style={{fontSize:13,color:pct===100?"var(--green)":"var(--text3)",fontWeight:600}}>{pct}%</span>
        </div>
        <div className="content">
          <div style={{padding:"8px 16px",display:"flex",gap:8,fontSize:12,color:"var(--text3)"}}>
            <span>{r.total} items</span><span>·</span><span style={{color:"var(--green)"}}>{r.resolved} resolved</span><span>·</span><span style={{color:"var(--red)"}}>{r.total-r.resolved} pending</span>
          </div>
          {r.items.map(s=><SnagCard key={s.id} snag={s} onTap={()=>setSelId(s.id)}/>)}
        </div>
      </div>
    );
  }

  return(
    <div className="container">
      <div className="topbar">
        <div><h1>PDI Snag Tracker</h1><p>Flat H-802, 7 PD</p></div>
        <button className="icon-btn" onClick={()=>setShowExport(true)} style={{color:"var(--blue)"}}>{Ic.share}</button>
      </div>
      <div className="content">
        {tab==="dashboard"&&<Dashboard stats={stats} snags={actionable} roomSnags={roomSnags} onRoom={setSelRoom} onReset={resetAll}/>}
        {tab==="list"&&<ListView snags={filtered} search={search} onSearch={setSearch} fStatus={fStatus} onFStatus={setFStatus} fSev={fSev} onFSev={setFSev} fComp={fComp} onFComp={setFComp} onSelect={setSelId}/>}
        {tab==="rooms"&&<RoomsView roomSnags={roomSnags} onSelect={setSelRoom}/>}
      </div>
      <div className="tabbar">
        {[["dashboard","Dashboard",Ic.dashboard],["list","List",Ic.list],["rooms","Rooms",Ic.rooms]].map(([k,l,ic])=>(
          <button key={k} onClick={()=>setTab(k)} className={`tab-btn ${tab===k?"active":""}`}>{ic}<span>{l}</span></button>
        ))}
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────
function Dashboard({stats,snags,roomSnags,onRoom,onReset}){
  const sevCounts=useMemo(()=>{
    const c={Critical:0,Major:0,Minor:0,Cosmetic:0};
    snags.forEach(s=>{if(s.status!=="Accepted"&&c[s.severity]!==undefined)c[s.severity]++});return c;
  },[snags]);
  return(
    <div style={{padding:16}}>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><p style={{fontSize:13,color:"var(--text3)"}}>Resolution Progress</p><p style={{fontSize:28,fontWeight:700,marginTop:4}}>{stats.pct}%</p></div>
          <div style={{position:"relative",width:64,height:64}}>
            <svg width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="var(--border)" strokeWidth="6"/><circle cx="32" cy="32" r="28" fill="none" stroke="var(--green)" strokeWidth="6" strokeDasharray={`${stats.pct*1.76} 176`} strokeLinecap="round" transform="rotate(-90 32 32)"/></svg>
            <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:11,fontWeight:600,color:"var(--green)"}}>{stats.resolved}/{stats.total}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {STATUSES.map(st=><span key={st} className="badge" style={{background:ST_COL[st]+"18",color:ST_COL[st]}}>{st}: {stats[st]||0}</span>)}
        </div>
      </div>
      <div className="card">
        <p style={{fontSize:13,fontWeight:600,marginBottom:10}}>Pending by Severity</p>
        {Object.entries(sevCounts).map(([sv,n])=>(
          <div key={sv} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{width:8,height:8,borderRadius:4,background:SV_COL[sv],flexShrink:0}}/>
            <span style={{fontSize:13,color:"var(--text2)",flex:1}}>{sv}</span>
            <span style={{fontSize:13,fontWeight:600}}>{n}</span>
            <div style={{width:80,height:6,background:"var(--border)",borderRadius:3}}><div style={{width:`${stats.total?(n/stats.total*100):0}%`,height:6,background:SV_COL[sv],borderRadius:3}}/></div>
          </div>
        ))}
      </div>
      <div className="card">
        <p style={{fontSize:13,fontWeight:600,marginBottom:10}}>Rooms — Most Pending</p>
        {Object.entries(roomSnags).filter(([,r])=>r.total>0).sort((a,b)=>(b[1].total-b[1].resolved)-(a[1].total-a[1].resolved)).slice(0,6).map(([name,r])=>{
          const p=r.total-r.resolved;
          return(<button key={name} onClick={()=>onRoom(name)} style={{display:"flex",alignItems:"center",width:"100%",padding:"8px 0",gap:8,textAlign:"left"}}><span style={{fontSize:13,color:"var(--text2)",flex:1}}>{name}</span><span style={{fontSize:12,color:p>0?"var(--red)":"var(--green)",fontWeight:600}}>{p} pending</span><span style={{fontSize:11,color:"var(--text4)"}}>/ {r.total}</span></button>);
        })}
      </div>
      <button onClick={onReset} style={{width:"100%",padding:12,border:"1px solid var(--border)",borderRadius:8,fontSize:12,color:"var(--text4)",marginTop:4}}>Reset to original inspection data</button>
    </div>
  );
}

// ─── LIST VIEW ────────────────────────────────────────────
function ListView({snags,search,onSearch,fStatus,onFStatus,fSev,onFSev,fComp,onFComp,onSelect}){
  const [showF,setShowF]=useState(false);
  return(
    <div>
      <div style={{padding:"8px 16px",display:"flex",gap:8}}>
        <div className="search-box">{Ic.search}<input value={search} onChange={e=>onSearch(e.target.value)} placeholder="Search snags..."/>{search&&<button onClick={()=>onSearch("")} style={{color:"var(--text4)"}}>{Ic.x}</button>}</div>
        <button className="icon-btn" onClick={()=>setShowF(!showF)} style={{background:showF?"var(--blue)":"var(--bg3)",color:showF?"#fff":"var(--text3)",borderRadius:10}}>{Ic.filter}</button>
      </div>
      {showF&&<div style={{padding:"0 16px 8px"}}>
        <FilterRow label="Status" value={fStatus} onChange={onFStatus} options={["All",...STATUSES]} colors={ST_COL}/>
        <FilterRow label="Severity" value={fSev} onChange={onFSev} options={["All","Critical","Major","Minor","Cosmetic"]} colors={SV_COL}/>
        <FilterRow label="Component" value={fComp} onChange={onFComp} options={["All",...COMPONENTS.filter(c=>c!=="Overview")]}/>
      </div>}
      <p style={{padding:"0 16px",fontSize:12,color:"var(--text4)",margin:"4px 0"}}>{snags.length} items</p>
      {snags.map(s=><SnagCard key={s.id} snag={s} onTap={()=>onSelect(s.id)}/>)}
      {snags.length===0&&<p style={{textAlign:"center",color:"var(--text4)",padding:40,fontSize:14}}>No snags match your filters</p>}
    </div>
  );
}
function FilterRow({label,value,onChange,options,colors={}}){
  return(<div className="filter-row"><span className="label">{label}</span>{options.map(o=>(<button key={o} onClick={()=>onChange(o)} className={`chip ${value===o?"active":""}`} style={{background:value===o?(colors[o]?colors[o]+"20":"#3b82f620"):"var(--bg3)",color:value===o?(colors[o]||"var(--blue)"):"var(--text3)"}}>{o}</button>))}</div>);
}

// ─── SNAG CARD ────────────────────────────────────────────
function SnagCard({snag,onTap}){
  return(
    <button className="snag-card" onClick={onTap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <span style={{fontSize:12,fontWeight:700,color:"var(--text4)"}}>#{snag.id}</span>
            <span style={{fontSize:11,color:"var(--text3)"}}>{snag.location}</span>
          </div>
          <p style={{fontSize:14,lineHeight:1.3}}>{snag.analysis}</p>
          <span style={{fontSize:11,color:"var(--text4)",marginTop:3,display:"block"}}>{snag.component}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <span className="badge" style={{background:ST_COL[snag.status]+"18",color:ST_COL[snag.status]}}>{snag.status}</span>
          <span className="badge" style={{background:SV_COL[snag.severity]+"18",color:SV_COL[snag.severity]}}>{snag.severity}</span>
        </div>
      </div>
    </button>
  );
}

// ─── ROOMS VIEW ───────────────────────────────────────────
function RoomsView({roomSnags,onSelect}){
  return(
    <div style={{padding:16}}>
      {LOCATIONS.filter(l=>l!=="Dry Balcony").map(name=>{
        const r=roomSnags[name];if(!r||r.total===0)return null;
        const p=r.total-r.resolved;const pct=Math.round(r.resolved/r.total*100);
        return(
          <button key={name} className="room-card" onClick={()=>onSelect(name)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div><p style={{fontSize:15,fontWeight:600}}>{name}</p>{ROOM_DIMS[name]&&<p style={{fontSize:11,color:"var(--text4)"}}>{ROOM_DIMS[name]} ft</p>}</div>
              <span style={{fontSize:22,fontWeight:700,color:pct===100?"var(--green)":"var(--blue)"}}>{pct}%</span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:pct===100?"var(--green)":"var(--blue)"}}/></div>
            <div style={{display:"flex",gap:12,fontSize:12,marginTop:6}}><span style={{color:"var(--text3)"}}>{r.total} total</span><span style={{color:"var(--green)"}}>{r.resolved} done</span>{p>0&&<span style={{color:"var(--red)"}}>{p} pending</span>}</div>
          </button>
        );
      })}
    </div>
  );
}

// ─── DETAIL VIEW ──────────────────────────────────────────
function Detail({snag,onBack,onUpdate,onAddNote}){
  const [noteText,setNoteText]=useState("");
  const [editing,setEditing]=useState(false);
  const [editRemedy,setEditRemedy]=useState(snag.remedy);
  const [userPhotos,setUserPhotos]=useState([]);
  const [lightbox,setLightbox]=useState(null);
  const fileRef=useRef();

  useEffect(()=>{setEditRemedy(snag.remedy);loadPhotos()},[snag.id]);

  async function loadPhotos(){try{const p=await getPhotos(snag.id);setUserPhotos(p)}catch(e){setUserPhotos([])}}

  const handleStatusChange=st=>{
    const ch={status:st};const d=new Date().toISOString().slice(0,10);
    if(st==="Fixed")ch.dateFixed=d;
    if(st==="Accepted"){ch.dateVerified=d;if(!snag.dateFixed)ch.dateFixed=d}
    if(st==="Open"){ch.dateFixed=null;ch.dateVerified=null}
    onUpdate(snag.id,ch);
  };
  const handleNote=()=>{if(!noteText.trim())return;onAddNote(snag.id,noteText.trim());setNoteText("")};
  const handlePhoto=async e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async()=>{
      const compressed=await compressImage(reader.result,800,0.7);
      const pid=Date.now();
      await savePhoto(snag.id,pid,compressed);
      await loadPhotos();
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };
  const handleDeletePhoto=async key=>{if(confirm("Delete this photo?")){await deletePhoto(key);await loadPhotos()}};

  const imgSrc=`images/snag-${String(snag.id).padStart(2,"0")}.jpg`;

  return(
    <div className="container">
      <div className="header"><button onClick={onBack}>{Ic.back}</button><h2>#{snag.id} — {snag.component}</h2></div>
      <div className="content">
        <div style={{padding:16}}>
          <p style={{fontSize:11,color:"var(--text4)",marginBottom:8}}>{snag.location} · Reported {snag.dateReported}</p>

          {/* Inspection Photo */}
          <img src={imgSrc} className="snag-img" alt={`Snag #${snag.id}`} onClick={()=>setLightbox(imgSrc)} style={{marginBottom:12,maxHeight:300}}
            onError={e=>{e.target.style.display="none"}}/>

          {/* Finding */}
          <div className="card">
            <p className="section-label">Finding</p>
            <p style={{fontSize:15,lineHeight:1.4}}>{snag.analysis}</p>
          </div>

          {/* Remedy */}
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <p className="section-label" style={{marginBottom:0}}>Remedy</p>
              <button onClick={()=>setEditing(!editing)} style={{color:"var(--blue)"}}>{Ic.edit}</button>
            </div>
            {editing?(
              <div style={{display:"flex",gap:6}}><input className="input-field" value={editRemedy} onChange={e=>setEditRemedy(e.target.value)} placeholder="Enter remedy..."/>
              <button className="save-btn" onClick={()=>{onUpdate(snag.id,{remedy:editRemedy});setEditing(false)}}>Save</button></div>
            ):(<p style={{fontSize:14,color:snag.remedy?"var(--text)":"var(--text4)"}}>{snag.remedy||"No remedy specified"}</p>)}
          </div>

          {/* Status + Severity */}
          <div className="card">
            <p className="section-label">Status</p>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
              {STATUSES.map(st=><button key={st} className="status-btn" onClick={()=>handleStatusChange(st)} style={{background:snag.status===st?ST_COL[st]:"var(--bg3)",color:snag.status===st?"#fff":"var(--text3)"}}>{st}</button>)}
            </div>
            <p className="section-label">Severity</p>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {["Critical","Major","Minor","Cosmetic"].map(sv=><button key={sv} className="status-btn" onClick={()=>onUpdate(snag.id,{severity:sv})} style={{background:snag.severity===sv?SV_COL[sv]:"var(--bg3)",color:snag.severity===sv?"#fff":"var(--text3)"}}>{sv}</button>)}
            </div>
          </div>

          {/* Timeline */}
          <div className="card">
            <p className="section-label">Timeline</p>
            <DateRow label="Reported" date={snag.dateReported}/>
            <DateRow label="Fixed" date={snag.dateFixed} editable onEdit={d=>onUpdate(snag.id,{dateFixed:d})}/>
            <DateRow label="Verified" date={snag.dateVerified} editable onEdit={d=>onUpdate(snag.id,{dateVerified:d})}/>
          </div>

          {/* User Photos */}
          <div className="card">
            <p className="section-label">Your Photos</p>
            <div className="user-photos">
              {userPhotos.map(p=>(
                <div key={p.key} style={{position:"relative"}}>
                  <img src={p.data} className="user-photo-thumb" onClick={()=>setLightbox(p.data)} alt="User photo"/>
                  <button onClick={()=>handleDeletePhoto(p.key)} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:10,background:"var(--red)",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              ))}
              <button className="photo-add-btn" onClick={()=>fileRef.current?.click()}>+</button>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
            </div>
            <p style={{fontSize:11,color:"var(--text4)",marginTop:6}}>Tap + to capture or upload a photo</p>
          </div>

          {/* Notes */}
          <div className="card">
            <p className="section-label">Notes</p>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input className="input-field" value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add a note..." onKeyDown={e=>{if(e.key==="Enter")handleNote()}}/>
              <button className="save-btn" onClick={handleNote}>Add</button>
            </div>
            {snag.notes.length===0&&<p style={{fontSize:13,color:"var(--text4)"}}>No notes yet</p>}
            {snag.notes.map((n,i)=>(<div key={i} style={{padding:"8px 0",borderTop:i>0?"1px solid var(--bg3)":"none"}}><p style={{fontSize:11,color:"var(--text4)"}}>{n.date}</p><p style={{fontSize:13,color:"var(--text2)",lineHeight:1.4,marginTop:2}}>{n.text}</p></div>))}
          </div>
        </div>
      </div>

      {/* Lightbox */}
      {lightbox&&<div className="lightbox" onClick={()=>setLightbox(null)}><button onClick={()=>setLightbox(null)}>{Ic.x}</button><img src={lightbox} alt="Full size"/></div>}
    </div>
  );
}

function DateRow({label,date,editable,onEdit}){
  const [em,setEm]=useState(false);
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0"}}>
      <span style={{fontSize:13,color:"var(--text3)"}}>{label}</span>
      {em?<input type="date" defaultValue={date||""} autoFocus onChange={e=>{onEdit(e.target.value||null);setEm(false)}} onBlur={()=>setEm(false)} style={{fontSize:13,border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px"}}/>:
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:13,color:date?"var(--text)":"var(--border)",fontWeight:date?500:400}}>{date||"—"}</span>
        {editable&&<button onClick={()=>setEm(true)} style={{color:"var(--blue)",fontSize:11}}>edit</button>}
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
